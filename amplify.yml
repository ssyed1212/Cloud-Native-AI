# Amplify build for Car Cloud Next.js app in this monorepo.
# Commands below handle both execution contexts:
# - repo root (Cloud-Native-AI)
# - app root already set to car-cloud/frontend
version: 1
applications:
  - appRoot: car-cloud/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20 || nvm install 20
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
